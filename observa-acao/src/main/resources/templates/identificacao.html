<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Identificação do Paciente</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="topo">
    <h1>ObservAção</h1>
</div>


<div class="container">

    <h2>Bem vindo(a) à ObservAção</h2>
    <p>Por favor digite seu nome e CPF</p>

    <form th:action="@{/avaliacao/paciente}" method="post" class="form-box">

        <label>Nome:</label>
        <input type="text" name="nome" required>

        <label>CPF:</label>
        <input type="text" name="cpf" required>

        <div class="botao-direita">
            <button type="submit">CONFIRMA</button>
        </div>

    </form>

    <a th:href="@{/}">
        <button class="voltar">Voltar</button>
    </a>

</div>

</body>
</html>
