<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Avaliação</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="topo">
    <h1>ObservAção</h1>
</div>


<div class="container">

    <h2>Realizar Avaliação</h2>

    <p>
        Atribua uma nota para o atendimento e deixe um comentário sobre sua experiência.
    </p>

    <form th:action="@{/avaliacao/formulario}" method="post">

        <label>Nota:</label>

        <div class="rating">

            <input type="radio" id="star5" name="nota" value="5" required>
            <label for="star5">★</label>

            <input type="radio" id="star4" name="nota" value="4">
            <label for="star4">★</label>

            <input type="radio" id="star3" name="nota" value="3">
            <label for="star3">★</label>

            <input type="radio" id="star2" name="nota" value="2">
            <label for="star2">★</label>

            <input type="radio" id="star1" name="nota" value="1">
            <label for="star1">★</label>

        </div>

        <br>

        <label>Comentário:</label>
        <textarea name="comentario" rows="5" placeholder="Descreva sua experiência..." required></textarea>

        <button type="submit">
            CONFIRMA
        </button>

    </form>

    <br>

    <a th:href="@{/avaliacao/profissional}">
        <button class="voltar">
            Voltar
        </button>
    </a>

</div>

</body>
</html>
