<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Unidade de Saúde</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="topo">
    <h1>ObservAção</h1>
</div>


<div class="container">

    <h2>Escolha a Unidade de Saúde</h2>

    <p>
        Selecione a unidade que deseja avaliar.
    </p>

    <form th:action="@{/avaliacao/unidade}" method="post">

        <label>Unidade de Saúde:</label>

        <select name="unidadeId" required>
            <option value="">Selecione uma unidade</option>

            <option th:each="unidade : ${unidades}"
                    th:value="${unidade.id}"
                    th:text="${unidade.nome}">
            </option>
        </select>
        <button type="submit">
            CONFIRMA
        </button>

    </form>

    <br>

    <a th:href="@{/avaliacao/paciente}">
        <button class="voltar">
            Voltar
        </button>
    </a>

</div>

</body>
</html>
